name: Sync fork from upstream

on:
  schedule:
    - cron: "17 * * * *"   # every hour at :17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync ${{ github.repository }} --source PassantYasser/ZE-dashboard
